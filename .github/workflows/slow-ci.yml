name: Slow CI
on:
  pull_request:
    branches: [main]
jobs:
  slow-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conditional pass/fail based on bad.txt presence
        run: |
          sleep 15
          if [ -f bad.txt ]; then
            echo "bad.txt present, failing genuinely"
            exit 1
          else
            echo "no bad.txt, passing"
            exit 0
          fi
